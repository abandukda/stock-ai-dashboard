name: Overnight Market Scan

on:
  schedule:
    - cron: "15 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  overnight-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      FAST_CRON_MODE: "true"
      FAST_CRON_SKIP_PRE_RANK_DEEP_APIS: "true"
      FULL_COMMITTEE_LIMIT: "15"
      ETF_FULL_COMMITTEE_LIMIT: "10"
      HTTP_TIMEOUT_FAST: "6"

      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}

      GITHUB_REPO_URL: "abandukda/stock-ai-dashboard"
      DATA_DIR: "."

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run overnight scan
        run: |
          python overnight_market_scan.py

      - name: Commit updated scan output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update overnight market scan data - $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
